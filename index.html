            const template = BATCH_TOOLS[i % BATCH_TOOLS.length];
            const name = i < BATCH_TOOLS.length ? template.n : `${template.n} v${Math.floor(i / BATCH_TOOLS.length) + 1}`;
            UNIQUE_AI_TOOLS.push({
                id: `tool-auto-${i}`,
                name: name,
                category: template.cat,
                hq: 'Global',
                setupTime: '2m',
                pricingDetail: 'Free / Pro',
                homeLink: template.h,
                docsLink: `${template.h}/docs`,
                pricingLink: `${template.h}/pricing`,
                n8nStatus: i % 2 === 0 ? 'Native Node' : 'HTTP Request',
                description: `Specialized ${template.cat.toLowerCase()} resource designed for high-fidelity AI-powered automation and operational efficiency. This tool drives peak performance through advanced neural networks and scales logic instantly across platforms. It is a critical component for professionals looking to scale their digital workflows through intelligent automation.`
            });
        }

        const App = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [viewMode, setViewMode] = useState('grid');
            const [scrolled, setScrolled] = useState(false);
            const [showToast, setShowToast] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const categoryList = useMemo(() => ['All', ...new Set(UNIQUE_AI_TOOLS.map(t => t.category))].sort(), []);

            const filteredTools = useMemo(() => {
                return UNIQUE_AI_TOOLS.filter(tool => {
                    const matchesSearch = tool.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                          tool.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                          tool.category.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCategory = selectedCategory === 'All' || tool.category === selectedCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchTerm, selectedCategory]);

            const handleLinkedInShare = () => {
                const shareUrl = window.location.href;
                const shareText = `Check out Neural Hub - the ultimate index of ${UNIQUE_AI_TOOLS.length} AI tools! 🚀 ${shareUrl}`;
                const textArea = document.createElement("textarea");
                textArea.value = shareText;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); setShowToast(true); setTimeout(() => setShowToast(false), 5000); } catch (err) {}
                document.body.removeChild(textArea);
                window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}`, '_blank');
            };

            return (
                <div className="min-h-screen text-white selection:bg-indigo-500/30">
                    {showToast && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-6 py-4 bg-indigo-600 rounded-2xl shadow-2xl border border-white/20 animate-fade-in">
                            <Icon name="check-circle" className="w-5 h-5 text-white" />
                            <div className="text-left">
                                <p className="text-sm font-bold">Copy success!</p>
                                <p className="text-[10px] text-indigo-100 font-medium">LinkedIn opened. Paste (Ctrl+V) to share.</p>
                            </div>
                            <button onClick={() => setShowToast(false)} className="ml-4 p-1 hover:bg-white/10 rounded-lg">
                                <Icon name="x" className="w-4 h-4" />
                            </button>
                        </div>
                    )}

                    <header className={`fixed top-0 w-full z-50 transition-all duration-300 border-b ${scrolled ? 'bg-black/80 backdrop-blur-xl border-white/10 py-3' : 'bg-transparent border-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between gap-8">
                            <div className="flex items-center gap-3 shrink-0 cursor-pointer" onClick={() => {setSearchTerm(''); setSelectedCategory('All'); window.scrollTo({top: 0, behavior: 'smooth'});}}>
                                <div className="relative group">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-indigo-600 to-cyan-500 rounded-lg blur opacity-40 group-hover:opacity-100 transition duration-500"></div>
                                    <div className="relative p-2 bg-black rounded-lg border border-white/20 flex items-center justify-center">
                                        <Icon name="cpu" className="w-6 h-6 text-white" />
                                    </div>
                                </div>
                                <div className="hidden sm:block text-left">
                                    <h1 className="text-lg font-bold tracking-tight text-white leading-none uppercase italic">NEURAL HUB</h1>
                                    <p className="text-[10px] font-medium tracking-widest text-white/40 uppercase mt-1">AN AI AGENT INDEX</p>
                                </div>
                            </div>

                            <div className="relative flex-grow max-w-xl group">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-white/30 group-focus-within:text-indigo-400">
                                    <Icon name="search" className="w-4 h-4" />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder={`Search ${UNIQUE_AI_TOOLS.length}+ tools...`} 
                                    className="w-full pl-11 pr-4 py-2.5 bg-white/5 border border-white/10 focus:border-indigo-500/50 focus:bg-white/10 rounded-full text-sm transition-all outline-none placeholder:text-white/20 text-white"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>

                            <div className="flex items-center gap-4 shrink-0">
                                <button onClick={handleLinkedInShare} className="group flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-white text-white hover:text-black rounded-full text-xs font-bold transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)] active:scale-95">
                                    <Icon name="linkedin" className="w-3.5 h-3.5 fill-current" /> SHARE
                                </button>
                                <div className="hidden md:flex items-center gap-1 border-l border-white/10 pl-4">
                                    <button onClick={() => setViewMode('grid')} className={`p-2 rounded-lg transition-all ${viewMode === 'grid' ? 'bg-white/10 text-white' : 'text-white/40 hover:text-white'}`}>
                                        <Icon name="layout-grid" className="w-4 h-4" />
                                    </button>
                                    <button onClick={() => setViewMode('list')} className={`p-2 rounded-lg transition-all ${viewMode === 'list' ? 'bg-white/10 text-white' : 'text-white/40 hover:text-white'}`}>
                                        <Icon name="list" className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 pt-32 pb-20">
                        <div className="flex items-center gap-2 mb-12 overflow-x-auto pb-4 no-scrollbar">
                            {categoryList.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`flex items-center gap-2 px-5 py-2 rounded-full text-xs font-semibold whitespace-nowrap border transition-all ${selectedCategory === cat ? 'bg-white text-black border-white shadow-[0_0_15px_rgba(255,255,255,0.2)]' : 'bg-white/5 border-white/10 text-white/60 hover:bg-white/10'}`}>
                                    <Icon name={CATEGORY_ICONS[cat] || 'sparkles'} className="w-3.5 h-3.5" /> {cat}
                                </button>
                            ))}
                        </div>

                        <div className="mb-12">
                            <h2 className="text-4xl font-bold tracking-tight mb-2">Intelligence Directory <span className="text-white/20 text-2xl font-normal ml-2">({filteredTools.length})</span></h2>
                            <p className="text-white/40 font-medium">Curated unique AI resources for modern automation and peak professional efficiency.</p>
                        </div>

                        {viewMode === 'grid' ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {filteredTools.map(tool => (
                                    <div key={tool.id} className="tool-card group relative bg-[#121214] border border-white/5 hover:border-white/20 transition-all duration-500 rounded-2xl overflow-hidden flex flex-col shadow-2xl min-h-[500px] h-full">
                                        <div className="tool-card-glow" style={{ backgroundColor: tool.accent || '#4f46e5' }}></div>
                                        <div className="p-6 relative z-10 flex flex-col h-full text-left">
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[9px] font-black text-white/50 bg-white/5 border border-white/10 px-2.5 py-1 rounded uppercase tracking-widest">{tool.category}</span>
                                                <div className={`text-[9px] font-black px-2 py-1 rounded uppercase border ${tool.n8nStatus === 'Native Node' ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' : 'bg-white/5 text-white/30 border-white/10'}`}>{tool.n8nStatus || 'HTTP Request'}</div>
                                            </div>
                                            <h3 className="text-xl font-bold mb-2 group-hover:text-indigo-300 transition-colors">{tool.name}</h3>
                                            <p className="text-xs text-white/40 leading-relaxed mb-8">{tool.description}</p>
                                            <div className="mt-auto space-y-3 mb-6 pt-6 border-t border-white/5">
                                                <div className="flex items-center justify-between text-[11px] font-bold"><span className="text-white/20 uppercase tracking-widest flex items-center gap-2"><Icon name="dollar-sign" className="w-3.5 h-3.5" /> Cost</span><span className="text-white/80">{tool.pricing || tool.pricingDetail}</span></div>
                                                <div className="flex items-center justify-between text-[11px] font-bold"><span className="text-white/20 uppercase tracking-widest flex items-center gap-2"><Icon name="clock" className="w-3.5 h-3.5" /> Setup</span><span className="text-white/80">{tool.setupTime}</span></div>
                                            </div>
                                            <div className="flex gap-2">
                                                <a href={tool.homeLink || tool.link} target="_blank" className="flex-1 flex items-center justify-center gap-2 py-2.5 bg-white/5 hover:bg-white text-white hover:text-black rounded-xl text-[10px] font-black transition-all uppercase tracking-widest border border-white/10">WEBSITE <Icon name="external-link" className="w-3 h-3" /></a>
                                                <a href={tool.docsLink} target="_blank" className="w-10 h-10 flex items-center justify-center bg-white/5 hover:bg-white/20 border border-white/10 rounded-xl transition-all" title="Docs"><Icon name="book-open" className="w-4 h-4 text-white/50" /></a>
                                                <a href={tool.pricingLink} target="_blank" className="w-10 h-10 flex items-center justify-center bg-white/5 hover:bg-white/20 border border-white/10 rounded-xl transition-all" title="Pricing"><Icon name="dollar-sign" className="w-4 h-4 text-white/50" /></a>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-[#121214] border border-white/5 rounded-3xl overflow-hidden shadow-2xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm">
                                        <thead>
                                            <tr className="border-b border-white/5 text-[10px] font-black uppercase tracking-widest text-white/20">
                                                <th className="px-8 py-6">AI Resource</th><th className="px-6 py-6">Category</th><th className="px-6 py-6">Integration</th><th className="px-6 py-6 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {filteredTools.map(tool => (
                                                <tr key={tool.id} className="hover:bg-white/5 transition-colors group">
                                                    <td className="px-8 py-5 font-bold">{tool.name}</td>
                                                    <td className="px-6 py-5 text-white/40 uppercase text-[10px] font-bold">{tool.category}</td>
                                                    <td className="px-6 py-5 text-indigo-400 font-bold text-[10px] uppercase">{tool.n8nStatus || 'HTTP Request'}</td>
                                                    <td className="px-6 py-5 text-right">
                                                        <div className="flex items-center justify-end gap-3">
                                                            <a href={tool.homeLink || tool.link} target="_blank" className="p-2 border border-white/10 rounded-lg hover:bg-white hover:text-black transition-all"><Icon name="external-link" className="w-4 h-4" /></a>
                                                            <a href={tool.docsLink} target="_blank" className="p-2 border border-white/10 rounded-lg hover:bg-white hover:text-black transition-all"><Icon name="book-open" className="w-4 h-4" /></a>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        <div className="mt-40 max-w-3xl mx-auto text-left border-t border-white/10 pt-20 animate-fade-in">
                            <h3 className="text-2xl font-bold mb-6 italic">Why I created Neural Hub</h3>
                            <p className="text-white/60 leading-relaxed mb-8">
                                I was building automations constantly and kept asking the same question: "Is there an AI tool for this?" Jumping between tabs, checking pricing, reading docs—it killed momentum. So I built Neural Hub: a searchable database of {UNIQUE_AI_TOOLS.length}+ AI tools organized by use case, with cost and setup time upfront. It solves the friction point I faced daily, and I realized others probably felt it too. Now you can find the right AI tool in seconds, not minutes.
                            </p>
                            <a 
                                href="https://www.linkedin.com/in/devesh--dubey/" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center gap-3 px-6 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold transition-all text-sm shadow-[0_0_20px_rgba(79,70,229,0.3)]"
                            >
                                <Icon name="linkedin" className="w-4 h-4 fill-current" />
                                Connect with me on LinkedIn
                            </a>
                        </div>
                    </main>

                    <footer className="mt-40 border-t border-white/5 bg-[#070708] py-20">
                        <div className="max-w-7xl mx-auto px-6 text-center">
                            <button onClick={handleLinkedInShare} className="mx-auto mb-10 flex items-center gap-3 px-8 py-4 bg-white/5 hover:bg-white text-white/60 hover:text-black border border-white/10 rounded-2xl font-black transition-all uppercase tracking-widest text-[10px]">
                                <Icon name="linkedin" className="w-4 h-4 fill-current" /> Share Intelligence Hub
                            </button>
                            <div className="flex items-center justify-center gap-3 opacity-20 mb-2">
                                <Icon name="cpu" className="w-5 h-5" />
                                <span className="text-[11px] font-black tracking-[0.4em] uppercase">NEURAL HUB v4.6.0</span>
                            </div>
                            <p className="text-[10px] text-white/10 font-bold uppercase tracking-[0.2em]">Unique AI Directory &bull; June 2026 Edition</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
