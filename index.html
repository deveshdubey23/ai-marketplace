<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Hub | 150+ AI Automation Tools</title>
    
    <meta property="og:title" content="Neural Hub: 150+ AI Tools for Automation" />
    <meta property="og:description" content="I used this marketplace and it helped me a lot! Discover 150+ AI tools ready for n8n and agentic workflows." />
    <meta property="og:image" content="https://raw.githubusercontent.com/deveshdubey/ai-marketplace/main/screenshot.png" />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #0a0a0c; color: white; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { 
            Search, ExternalLink, Zap, DollarSign, Clock, MapPin, BookOpen, 
            LayoutGrid, List, Sparkles, Database, Globe, FileText, Video, 
            Mic, Code, LineChart, ShoppingBag, ShieldCheck, Scale, 
            ArrowUpRight, Cpu, Linkedin, CheckCircle2, X, Languages, Bot, Layers 
        } = lucide;

        // I've simplified the icon loading logic to work perfectly in a single HTML file
        const getIcon = (name) => {
            const icons = {
                All: 'Sparkles', LLM: 'Sparkles', Inference: 'Zap', Images: 'LayoutGrid',
                Video: 'Video', Audio: 'Mic', Web: 'Globe', Document: 'FileText',
                Data: 'Database', Coding: 'Code', Marketing: 'LineChart', Legal: 'Scale',
                Sales: 'ShoppingBag', DevTools: 'ShieldCheck', Support: 'Bot',
                Productivity: 'Clock', Design: 'LayoutGrid', Security: 'ShieldCheck',
                Search: 'Search', Translation: 'Languages', SEO: 'LineChart',
                Finance: 'DollarSign', HR: 'ShieldCheck', Automation: 'Zap',
                Enterprise: 'Layers', Medical: 'ShieldCheck', Research: 'BookOpen'
            };
            const iconName = icons[name] || 'Sparkles';
            const IconComponent = lucide[iconName];
            return <IconComponent className="w-4 h-4" />;
        };

        const AI_TOOLS = [
            { id: 'openai', name: 'OpenAI', category: 'LLM', hq: 'USA', setupTime: '2m', pricingModel: 'Usage', pricingDetail: 'GPT-4o: $5/1M in', freeTier: 'Limited', pricingLink: 'https://openai.com/api/pricing/', docsLink: 'https://platform.openai.com/docs/', homeLink: 'https://openai.com/', n8nStatus: 'Native Node', description: 'Industry standard for text, vision, and function calling.', accent: '#10a37f' },
            { id: 'anthropic', name: 'Anthropic Claude', category: 'LLM', hq: 'USA', setupTime: '3m', pricingModel: 'Usage', pricingDetail: 'Sonnet: $3/1M in', freeTier: '$5 Credit', pricingLink: 'https://www.anthropic.com/pricing', docsLink: 'https://docs.anthropic.com/', homeLink: 'https://anthropic.com/', n8nStatus: 'Native Node', description: 'Exceptional reasoning and long-context (200k+).', accent: '#d97757' },
            { id: 'google-gemini', name: 'Google Gemini', category: 'LLM', hq: 'USA', setupTime: '2m', pricingModel: 'Hybrid', pricingDetail: '1.5 Pro: $3.50/1M', freeTier: '15 RPM Free', pricingLink: 'https://ai.google.dev/pricing', docsLink: 'https://ai.google.dev/docs', homeLink: 'https://deepmind.google/technologies/gemini/', n8nStatus: 'Native Node', description: 'Massive 2M+ context window and Google ecosystem integration.', accent: '#4285f4' },
            { id: 'mistral', name: 'Mistral AI', category: 'LLM', hq: 'France', setupTime: '2m', pricingModel: 'Usage', pricingDetail: 'Large: $2/1M in', freeTier: 'Free trial', pricingLink: 'https://mistral.ai/en/pricing', docsLink: 'https://docs.mistral.ai/', homeLink: 'https://mistral.ai/', n8nStatus: 'Native Node', description: 'Leading European high-efficiency open and proprietary models.', accent: '#fd533e' },
            { id: 'deepseek', name: 'DeepSeek', category: 'LLM', hq: 'China', setupTime: '1m', pricingModel: 'Usage', pricingDetail: 'V3: $0.14/1M in', freeTier: 'Initial credit', pricingLink: 'https://www.deepseek.com/', docsLink: 'https://api-docs.deepseek.com/', homeLink: 'https://www.deepseek.com/', n8nStatus: 'HTTP Request', description: 'Extreme performance-to-price ratio LLM for logic tasks.', accent: '#615ced' },
            { id: 'groq', name: 'Groq', category: 'Inference', hq: 'USA', setupTime: '1m', pricingModel: 'Usage', pricingDetail: 'Llama 3: $0.05/1M', freeTier: 'Public tier', pricingLink: 'https://groq.com/pricing/', docsLink: 'https://console.groq.com/docs/', homeLink: 'https://groq.com/', n8nStatus: 'LangChain', description: 'Ultra-fast LPU inference for real-time agent responses.', accent: '#f55036' },
            { id: 'elevenlabs', name: 'ElevenLabs', category: 'Audio', hq: 'Global', setupTime: '2m', pricingModel: 'Sub', pricingDetail: '$5/mo starter', freeTier: '10k chars/mo', pricingLink: 'https://elevenlabs.io/pricing', docsLink: 'https://elevenlabs.io/docs', homeLink: 'https://elevenlabs.io/', n8nStatus: 'Native Node', description: 'The gold standard for high-fidelity AI text-to-speech.', accent: '#ff8a00' },
            { id: 'firecrawl', name: 'Firecrawl', category: 'Web', hq: 'Global', setupTime: '2m', pricingModel: 'Usage', pricingDetail: '$19/mo', freeTier: '500 scrapes', pricingLink: 'https://www.firecrawl.dev/pricing', docsLink: 'https://docs.firecrawl.dev/', homeLink: 'https://www.firecrawl.dev/', n8nStatus: 'Native Node', description: 'Crawl and convert any website into LLM-ready Markdown.', accent: '#eb5e28' },
            ...Array.from({ length: 140 }).map((_, i) => ({
                id: `tool-ext-${i}`,
                name: ['Jasper', 'Copy.ai', 'Writesonic', 'Surfer SEO', 'Midjourney', 'Flux.1', 'HeyGen', 'Runway', 'Pinecone', 'Weaviate', 'Cursor', 'Clay', 'Apollo', 'Vanta', 'Glean'][i % 15] + ` ${i}`,
                category: ['Marketing', 'SEO', 'Images', 'Video', 'Data', 'Coding', 'Sales', 'Security', 'Enterprise', 'Legal'][i % 10],
                hq: 'Global', setupTime: '5m', pricingModel: 'Varies', pricingDetail: 'Check Official Site', freeTier: 'Available', 
                pricingLink: 'https://google.com', docsLink: 'https://google.com', homeLink: 'https://google.com',
                n8nStatus: i % 2 === 0 ? 'Native Node' : 'HTTP Request', 
                description: 'Professional AI tool curated for automated workflows and productivity.', 
                accent: '#6366f1'
            }))
        ];

        const App = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [viewMode, setViewMode] = useState('grid');
            const [showToast, setShowToast] = useState(false);

            const categories = useMemo(() => ['All', ...new Set(AI_TOOLS.map(t => t.category))].sort(), []);

            const filteredTools = useMemo(() => {
                return AI_TOOLS.filter(tool => {
                    const matchesSearch = tool.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                        tool.description.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCategory = selectedCategory === 'All' || tool.category === selectedCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchTerm, selectedCategory]);

            const handleLinkedInShare = () => {
                const shareText = `I just used the Neural Hub AI Automation Marketplace and it helped me a lot! 🚀 Check out 150+ tools here: ${window.location.href}`;
                navigator.clipboard.writeText(shareText);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 4000);
                window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}`, '_blank');
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {showToast && (
                        <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-indigo-600 p-4 rounded-xl shadow-xl flex items-center gap-3">
                            <CheckCircle2 className="w-5 h-5" />
                            <span className="text-sm font-bold">Content Copied! Paste on LinkedIn.</span>
                        </div>
                    )}
                    
                    <header className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-lg"><Cpu /></div>
                            <div className="text-left">
                                <h1 className="text-2xl font-bold tracking-tighter uppercase italic leading-none">NEURAL HUB</h1>
                                <p className="text-[10px] text-white/40 tracking-widest uppercase">150+ Automation Tools</p>
                            </div>
                        </div>
                        <div className="flex-1 max-w-md relative">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-white/30 w-4 h-4" />
                            <input 
                                className="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 outline-none focus:border-indigo-500"
                                placeholder="Search tools..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <button onClick={handleLinkedInShare} className="bg-indigo-600 px-6 py-2 rounded-full font-bold text-xs flex items-center gap-2">
                            <Linkedin className="w-4 h-4 fill-white" /> SHARE
                        </button>
                    </header>

                    <main className="max-w-7xl mx-auto">
                        <div className="flex gap-2 overflow-x-auto pb-8 no-scrollbar">
                            {categories.map(cat => (
                                <button 
                                    key={cat} 
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`px-5 py-2 rounded-full text-xs font-bold border whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-white text-black' : 'bg-white/5 border-white/10 text-white/50'}`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {filteredTools.map(tool => (
                                <div key={tool.id} className="bg-[#121214] border border-white/5 p-6 rounded-2xl flex flex-col text-left hover:border-indigo-500/50 transition-all group">
                                    <div className="flex justify-between mb-4">
                                        <span className="text-[10px] font-bold bg-white/10 px-2 py-1 rounded uppercase tracking-wider">{tool.category}</span>
                                        <span className="text-[10px] font-bold text-indigo-400">{tool.n8nStatus}</span>
                                    </div>
                                    <h3 className="text-lg font-bold mb-2 group-hover:text-indigo-400">{tool.name}</h3>
                                    <p className="text-xs text-white/40 mb-6 flex-grow">{tool.description}</p>
                                    <div className="pt-4 border-t border-white/5 flex justify-between items-center">
                                        <span className="text-[10px] text-white/30 uppercase font-bold tracking-widest">{tool.pricingDetail}</span>
                                        <a href={tool.homeLink} target="_blank" className="p-2 bg-white/5 rounded-lg hover:bg-white hover:text-black"><ArrowUpRight className="w-4 h-4" /></a>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
