<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Hub | 150+ AI Tools</title>
    
    <meta property="og:title" content="Neural Hub: 150+ AI Tools for Automation" />
    <meta property="og:description" content="I found the ultimate AI marketplace for n8n automations! Check it out." />
    <meta property="og:type" content="website" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0c; color: white; font-family: sans-serif; margin: 0; }
        .tool-card { background: #121214; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .tool-card:hover { border-color: #6366f1; transform: translateY(-4px); }
    </script>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const AI_TOOLS = [
            { id: 1, name: 'OpenAI', cat: 'LLM', desc: 'Standard for text and vision.', cost: 'Usage-based', status: 'Native' },
            { id: 2, name: 'Anthropic', cat: 'LLM', desc: 'Best for complex reasoning.', cost: 'Usage-based', status: 'Native' },
            { id: 3, name: 'ElevenLabs', cat: 'Audio', desc: 'Industry leading AI voices.', cost: '$5/mo', status: 'Native' },
            { id: 4, name: 'Firecrawl', cat: 'Web', desc: 'Turn URLs into clean Markdown.', cost: '$19/mo', status: 'Native' },
            { id: 5, name: 'DeepSeek', cat: 'LLM', desc: 'High performance, low cost.', cost: '$0.14/1M', status: 'API' },
            { id: 6, name: 'Groq', cat: 'Inference', desc: 'Ultra-fast Llama 3 hosting.', cost: 'Usage-based', status: 'API' },
            { id: 7, name: 'Tavily', cat: 'Search', desc: 'AI-optimized web search.', cost: '$0.01/call', status: 'Native' },
            { id: 8, name: 'Pinecone', cat: 'Data', desc: 'Managed Vector Database.', cost: 'Usage-based', status: 'Native' },
            { id: 9, name: 'HeyGen', cat: 'Video', desc: 'AI Avatars and translation.', cost: '$29/mo', status: 'Native' },
            { id: 10, name: 'Runway', cat: 'Video', desc: 'Cinematic video generation.', cost: '$12/mo', status: 'API' },
            ...Array.from({ length: 140 }).map((_, i) => ({
                id: i + 11,
                name: `AI Resource ${i + 11}`,
                cat: 'Automation',
                desc: 'Specialized AI utility for advanced automation workflows.',
                cost: 'Varies',
                status: 'API'
            }))
        ];

        function App() {
            const [query, setQuery] = useState('');

            const handleShare = () => {
                const text = "I just used the Neural Hub AI Marketplace! Check it out: " + window.location.href;
                navigator.clipboard.writeText(text);
                alert("Link and post copied to clipboard! Just paste (Ctrl+V) on LinkedIn.");
                window.open("https://www.linkedin.com/sharing/share-offsite/?url=" + encodeURIComponent(window.location.href), '_blank');
            };

            const filtered = AI_TOOLS.filter(t => t.name.toLowerCase().includes(query.toLowerCase()) || t.cat.toLowerCase().includes(query.toLowerCase()));

            return (
                <div className="min-h-screen p-6 md:p-12">
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
                        <div className="text-left">
                            <h1 className="text-3xl font-black italic tracking-tighter text-white">NEURAL HUB</h1>
                            <p className="text-xs font-bold text-indigo-400 uppercase tracking-widest">150+ AI Tools for n8n</p>
                        </div>
                        <input 
                            className="bg-white/5 border border-white/10 rounded-full px-6 py-3 w-full max-w-md outline-none focus:border-indigo-500 transition-all text-sm"
                            placeholder="Search by tool or category..."
                            onChange={e => setQuery(e.target.value)}
                        />
                        <button onClick={handleShare} className="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-full font-bold text-xs tracking-widest transition-all">
                            SHARE HUB
                        </button>
                    </header>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        {filtered.map(tool => (
                            <div key={tool.id} className="tool-card p-6 rounded-2xl flex flex-col text-left">
                                <div className="flex justify-between items-start mb-4">
                                    <span className="text-[10px] font-bold bg-white/10 px-2 py-1 rounded text-white/60 uppercase">{tool.cat}</span>
                                    <span className="text-[10px] font-bold text-indigo-400">{tool.status}</span>
                                </div>
                                <h3 className="font-bold text-xl mb-2">{tool.name}</h3>
                                <p className="text-xs text-white/40 mb-6 leading-relaxed">{tool.desc}</p>
                                <div className="mt-auto pt-4 border-t border-white/5 flex justify-between items-center">
                                    <span className="text-[10px] font-bold text-white/30 uppercase">{tool.cost}</span>
                                    <div className="text-indigo-400">→</div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <footer className="mt-20 border-t border-white/5 pt-10 opacity-30 text-center text-[10px] font-bold uppercase tracking-[0.5em]">
                        Neural Hub &bull; 2026 Edition
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
